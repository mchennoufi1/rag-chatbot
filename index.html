<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Support Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 18px; font-weight: 600; }
    header span { font-size: 12px; color: #64748b; }

    .dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    .sidebar h2 { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }

    .upload-area {
      border: 2px dashed #334155;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      font-size: 13px;
      color: #64748b;
    }

    .upload-area:hover { border-color: #6366f1; color: #a5b4fc; }

    .upload-area input { display: none; }

    .convert-buttons { display: flex; flex-direction: column; gap: 8px; }

    .btn {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-secondary { background: #334155; color: #e2e8f0; }

    .status-msg {
      font-size: 12px;
      color: #22c55e;
      min-height: 16px;
    }

    /* Chat */
    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 780px;
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      flex-shrink: 0;
    }

    .avatar.ai { background: #6366f1; }
    .avatar.user { background: #334155; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 640px;
    }

    .message.ai .bubble { background: #1e293b; }
    .message.user .bubble { background: #6366f1; }

    .sources {
      margin-top: 8px;
      font-size: 11px;
      color: #64748b;
    }

    .typing .bubble { color: #64748b; font-style: italic; }

    .input-area {
      padding: 16px 24px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      gap: 12px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
    }

    .input-area input:focus { border-color: #6366f1; }
    .input-area input::placeholder { color: #475569; }

    .send-btn {
      padding: 12px 20px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>AI Support Chatbot</h1>
  <span>Powered by Claude + RAG</span>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Upload Documents</h2>

    <label class="upload-area">
      <input type="file" id="pdfInput" accept=".pdf" />
      📄 Click to upload PDF
    </label>
    <button class="btn btn-primary" onclick="uploadPDF()">Upload & Index PDF</button>

    <h2 style="margin-top:8px;">Convert & Index</h2>
    <div class="convert-buttons">
      <label class="upload-area">
        <input type="file" id="jpegInput" accept=".jpg,.jpeg" />
        🖼️ Click to select JPEG
      </label>
      <button class="btn btn-secondary" onclick="convertJPEG()">Convert JPEG → PDF</button>

      <label class="upload-area">
        <input type="file" id="csvInput" accept=".csv" />
        📊 Click to select CSV
      </label>
      <button class="btn btn-secondary" onclick="convertCSV()">Convert CSV → PDF</button>
    </div>

    <div class="status-msg" id="statusMsg"></div>
  </div>

  <!-- Chat -->
  <div class="chat">
    <div class="messages" id="messages">
      <div class="message ai">
        <div class="avatar ai">AI</div>
        <div class="bubble">
          Hi! Upload a document in the sidebar, then ask me anything about it.
        </div>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="queryInput" placeholder="Ask a question about your documents..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const API = "https://rag-chatbot-production-028f.up.railway.app";
const API_KEY = "my-super-secret-key-123";
let chatHistory = [];

function setStatus(msg, color = "#22c55e") {
  const el = document.getElementById("statusMsg");
  el.style.color = color;
  el.textContent = msg;
}

function addMessage(role, text = "", sources = []) {
  const messages = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `message ${role}`;

  const avatar = document.createElement("div");
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === "ai" ? "AI" : "You";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');

  if (sources.length > 0) {
    const src = document.createElement("div");
    src.className = "sources";
    src.textContent = "Sources: " + sources.map(s => s.split("/").pop()).join(", ");
    bubble.appendChild(src);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return bubble;
}

async function uploadPDF() {
  const file = document.getElementById("pdfInput").files[0];
  if (!file) return setStatus("Please select a PDF first.", "#f87171");
  setStatus("Uploading...", "#94a3b8");
  const form = new FormData();
  form.append("file", file);
  const res = await fetch(`${API}/upload/pdf`, {
    method: "POST", body: form,
    headers: { "X-API-Key": API_KEY }
  });
  const data = await res.json();
  setStatus(data.message || "Done!");
}

async function convertJPEG() {
  const file = document.getElementById("jpegInput").files[0];
  if (!file) return setStatus("Please select a JPEG first.", "#f87171");
  setStatus("Converting...", "#94a3b8");
  const form = new FormData();
  form.append("file", file);
  const res = await fetch(`${API}/convert/jpeg-to-pdf`, {
    method: "POST", body: form,
    headers: { "X-API-Key": API_KEY }
  });
  const data = await res.json();
  setStatus(data.message || "Done!");
}

async function convertCSV() {
  const file = document.getElementById("csvInput").files[0];
  if (!file) return setStatus("Please select a CSV first.", "#f87171");
  setStatus("Converting...", "#94a3b8");
  const form = new FormData();
  form.append("file", file);
  const res = await fetch(`${API}/convert/csv-to-pdf`, {
    method: "POST", body: form,
    headers: { "X-API-Key": API_KEY }
  });
  const data = await res.json();
  setStatus(data.message || "Done!");
}

async function sendMessage() {
  const input = document.getElementById("queryInput");
  const query = input.value.trim();
  if (!query) return;

  input.value = "";
  document.getElementById("sendBtn").disabled = true;

  addMessage("user", query);
  chatHistory.push({ role: "user", content: query });

  const bubble = addMessage("ai", "");
  bubble.textContent = "";

  try {
    const res = await fetch(`${API}/ask/stream`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-API-Key": API_KEY
      },
      body: JSON.stringify({ query, history: chatHistory.slice(0, -1) })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullAnswer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");

      for (const line of lines) {
        if (line.startsWith("data: ") && line !== "data: [DONE]") {
          const data = JSON.parse(line.slice(6));
          fullAnswer += data.text;
          bubble.innerHTML = fullAnswer.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
          document.getElementById("messages").scrollTop =
            document.getElementById("messages").scrollHeight;
        }
      }
    }

    chatHistory.push({ role: "assistant", content: fullAnswer });

  } catch (err) {
    bubble.textContent = "Error: " + err.message;
  }

  document.getElementById("sendBtn").disabled = false;
}
</script>

</body>
</html>
